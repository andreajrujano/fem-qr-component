<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | QR code component</title>

</head>
<body>
  <main class="container">
    <div class="card">
      <a href="https://www.frontendmentor.io" class="qr-link" target="_blank" rel="noopener noreferrer">
      <img src="./images/image-qr-code.png" alt="QR code graphic for Frontend Mentor" class="qr-pic">
      </a>
      <div class="info-section">
        <h1 class="text-preset-1 centered-text"> Improve your front-end skills by building projects </h1>
        <p class="text-preset-2 centered-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
    </div>
  </main>
</body>
</html>
